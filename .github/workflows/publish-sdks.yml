name: Publish SDKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package(s) to publish to npm'
        type: choice
        required: true
        default: all
        options:
          - all
          - connector
          - connector-debugger

permissions:
  contents: read
  id-token: write

jobs:
  publish-packages:
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # npm@latest (v12+) requires Node ^22.22.2 || ^24.15.0 || >=26
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.0

      - name: Update npm for trusted publishing
        # Trusted publishing needs npm >=11.5.1. Pinned to 11 because npm@12.0.0
        # has a packaging bug: libnpmpublish@12 requires `sigstore` but npm@12
        # doesn't bundle it, so `npm publish` with provenance crashes with
        # MODULE_NOT_FOUND. Revisit when npm@12.x fixes the sigstore bundling.
        run: npm install -g npm@11

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests (skip for now)
        run: echo "Skipping tests for initial publish"

      - name: Publish @solana/connector
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.package == 'all' || github.event.inputs.package == 'connector' }}
        working-directory: packages/connector
        run: npm publish --access public

      - name: Publish @solana/connector-debugger
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.package == 'all' || github.event.inputs.package == 'connector-debugger' }}
        working-directory: packages/devtools
        run: npm publish --access public

  create-release:
    if: startsWith(github.ref, 'refs/tags/') && always() && !cancelled()
    needs: [publish-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Solana Connector Packages Published

            ### @solana/connector
            - Package: `@solana/connector`
            - Version: ${{ github.ref_name }}
            - Registry: npm

            ### @solana/connector-debugger
            - Package: `@solana/connector-debugger`
            - Version: ${{ github.ref_name }}
            - Registry: npm

            ## Installation

            ```bash
            npm install @solana/connector@${{ github.ref_name }}
            npm install @solana/connector-debugger@${{ github.ref_name }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
